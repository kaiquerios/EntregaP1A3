<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Perfil - CLT Gaming</title>
    <link rel="stylesheet" href="../css/editUser.css" />
    <link rel="stylesheet" href="../css/global.css" />
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-container">
        <a href="home.html"" class="navbar-logo">
        <img src="../assets/img/icon_clt.png" alt="Icone">
        <span>CLT</span> Gaming
        </a>
      
        <div class="search-bar">
            <input type="text" placeholder="Buscar jogos...">
            <span class="search-icon">🔎</span>
        </div>

        <div class="navbar-menu" id="navbar-menu">
            <a href="#loja" class="navbar-item active">Loja</a>
            <a href="library.html" class="navbar-item">Biblioteca</a>
            <a href="#rankings" class="navbar-item">Rankings</a>
        </div>
      </div>

      <div class="navbar-actions">
        <div class="action-icon" id="theme-toggle-btn" title="Alternar Tema">☀️</div>
        <div class="action-icon notification" id="nav-notification">
            🔔 <span class="badge-notification">0</span>
        </div>
        <a href="cart.html" class="cart-btn">
            <div class="action-icon cart" id="nav-cart">
            🛒 <span class="badge-cart">0</span>
        </div>
        </a>
        <div id="user-area" class="user-profile">
        </div>
      </div>
    </nav>

    <!-- Modal -->
    <div class="edit-user-overlay" id="modal">
      <div class="edit-user-container">
        <!-- Cabeçalho -->
        <div class="edit-user-header">
          <h2 class="edit-user-title">Editar Perfil</h2>
          <button class="edit-user-close" onclick="fecharModal()">✕</button>
        </div>

        <!-- Feedback inline -->
        <div class="feedback-inline" id="feedback-inline"></div>

        <div class="edit-user-avatar-section">
          <div class="edit-user-avatar" id="avatar-iniciais">--</div>
        </div>

        <!-- Campos -->
        <div class="edit-user-form">
          <div class="edit-user-field">
            <label class="edit-user-label">Email</label>
            <input
              class="edit-user-input edit-user-input--readonly"
              type="email"
              value="augusto@email.com"
              readonly
            />
            <span class="edit-user-hint">O email não pode ser alterado.</span>
          </div>

          <div class="edit-user-field">
            <label class="edit-user-label">Nome completo</label>
            <input
              class="edit-user-input"
              type="text"
              id="input-nome-completo"
              placeholder="Seu nome completo"
              oninput="atualizarIniciais()"
            />
          </div>

          <button
            class="edit-user-toggle-btn"
            id="btn-username"
            onclick="
              toggleBloco(
                'bloco-username',
                'btn-username',
                'Alterar nome de usuário',
              )
            "
          >
            Alterar nome de usuário
          </button>

          <div
            class="edit-user-expandable"
            id="bloco-username"
            style="display: none"
          >
            <div class="edit-user-field">
              <label class="edit-user-label">Novo nome de usuário</label>
              <input
                class="edit-user-input"
                type="text"
                id="input-username"
                placeholder="@novo_usuario"
              />
            </div>
            <button class="edit-user-confirm-btn" onclick="confirmarUsername()">
              Confirmar
            </button>
          </div>

          <button
            class="edit-user-toggle-btn"
            id="btn-senha"
            onclick="toggleBloco('bloco-senha', 'btn-senha', 'Alterar senha')"
          >
            Alterar senha
          </button>

          <div
            class="edit-user-expandable"
            id="bloco-senha"
            style="display: none"
          >
            <div class="edit-user-field">
              <label class="edit-user-label">Senha atual</label>
              <div class="input-senha-wrapper">
                <input
                  class="edit-user-input"
                  type="password"
                  id="input-senha-atual"
                  placeholder="Digite sua senha atual"
                />
                <button
                  type="button"
                  class="btn-olho"
                  onclick="toggleSenha('input-senha-atual', this)"
                >
                  👁
                </button>
              </div>
            </div>

            <div class="edit-user-field">
              <label class="edit-user-label">Nova senha</label>
              <div class="input-senha-wrapper">
                <input
                  class="edit-user-input"
                  type="password"
                  id="input-nova-senha"
                  placeholder="Digite a nova senha"
                />
                <button
                  type="button"
                  class="btn-olho"
                  onclick="toggleSenha('input-nova-senha', this)"
                >
                  👁
                </button>
              </div>
            </div>

            <div class="edit-user-field">
              <label class="edit-user-label">Confirmar nova senha</label>
              <div class="input-senha-wrapper">
                <input
                  class="edit-user-input"
                  type="password"
                  id="input-confirmar-senha"
                  placeholder="Confirme a nova senha"
                />
                <button
                  type="button"
                  class="btn-olho"
                  onclick="toggleSenha('input-confirmar-senha', this)"
                >
                  👁
                </button>
              </div>
            </div>

            <button class="edit-user-confirm-btn" onclick="confirmarSenha()">
              Confirmar
            </button>
          </div>
        </div>

        <!-- Rodapé -->
        <div class="edit-user-footer">
          <button class="edit-user-cancel-btn" onclick="fecharModal()">
            Cancelar
          </button>
          <button class="edit-user-save-btn" onclick="salvarAlteracoes()">
            Salvar alterações
          </button>
        </div>
      </div>
    </div>

    <script src="../js/editUser.js"></script>
  </body>
</html>
