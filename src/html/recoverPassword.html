<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CLT Gaming - Recuperar Senha</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="signin-container">
        <div class="signin-form">
            <h2>Recuperar <span class="logo-text">Senha</span></h2>
            <p style="text-align: center; margin-bottom: 20px; font-size: 0.9rem; color: var(--text-muted);">
                Insira seu e-mail para receber as instruções de redefinição.
            </p>
            
            <div class="form-group">
                <label for="recovery-email">E-mail cadastrado</label>
                <input type="email" id="recovery-email" placeholder="seu@email.com">
            </div>

            <button class="btn-signin">Enviar link</button>

            <div class="signin-footer">
                <a href="login.html">Voltar para o login</a>
            </div>
        </div>
    </div>
</body>
</html>
