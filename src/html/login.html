<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLT Gaming - Entrar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="home.html"" class="navbar-logo">
            <img src="../assets/img/icon_clt.png" alt="Icone">
            <span>CLT</span> Gaming
            </a>
        </div>
    </nav>

    <div class="signin-container">
        <form class="signin-form" id="login-form">
            <h2>Entrar na <span class="logo-text">CLT Gaming</span></h2>
            
            <p class="error-message" id="error-message" style="display: none;"></p>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha">
                <a href="recoverPassword.html" class="forgot-link">Esqueci minha senha</a>
            </div>

            <button type="submit" class="btn-signin">Entrar</button>

            <div class="signin-footer">
                <span>Não tem uma conta? <a href="signUp.html">Cadastre-se</a></span>
                
            </div>
        </form>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
