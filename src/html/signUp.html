<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Launcher</title>
    <link rel="stylesheet" href="../css/signUp.css" />
    <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="home.html"" class="navbar-logo">
            <img src="../assets/img/icon_clt.png" alt="Icone">
            <span>CLT</span> Gaming
            </a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Criar <span>Conta</span></h2>
                <p>Preencha os dados abaixo para começar</p>
            </div>

            <form id="signUpForm" class="auth-form">
                <div class="form-row">
                    <div class="form-field">
                        <label for="fullName">Nome</label>
                        <input type="text" id="fullName" name="ffullName" placeholder="Ex: Chris Redfield" required>
                    </div>
                    <div class="form-field">
                        <label for="username">Nickname</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-field">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required>
                        <small id="emailError" class="error-message"></small>
                    </div>
                    <div class="form-field">
                        <label for="confirmEmail">Confirmar E-mail</label>
                        <input type="email" id="confirmEmail" name="confirmEmail" required>
                        <small id="confirmEmailError" class="error-message"></small>
                    </div>
                </div>    

                <div class="form-row">
                    <div class="form-field">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required>
                        <small id="passError" class="error-message"></small>
                    </div>
                    <div class="form-field">
                        <label for="confirmPassword">Confirmar Senha</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                        <small id="confirmPassError" class="error-message"></small>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn-primary" disabled>Finalizar Cadastro</button>
            </form>
        </div>
    </div>
    <script src="../js/signUp.js"></script>
</body>
</html>
