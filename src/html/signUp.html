<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Launcher</title>
    <link rel="stylesheet" href="/EntregaP1A3/src/css/signUp.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Criar <span>Conta</span></h2>
                <p>Preencha os dados abaixo para começar</p>
            </div>

            <form id="signUpForm" class="auth-form">
                <div class="form-row">
                    <div class="form-field">
                        <label for="firstName">Nome</label>
                        <input type="text" id="firstName" name="firstName" placeholder="Ex: Chris" required>
                    </div>
                    <div class="form-field">
                        <label for="lastName">Sobrenome</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Ex: Redfield" required>
                    </div>
                </div>

                <div class="form-field form-field-compact">
                    <label for="birthDate">Data de Nascimento</label>
                    <input type="text" id="birthDate" name="birthDate" placeholder="DD/MM/AAAA" maxlength="10" required>
                </div>

                <div class="form-field">
                    <label for="username">Nickname</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-field">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-row">
                    <div class="form-field">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-field">
                        <label for="confirmPassword">Confirmar Senha</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn-primary">Finalizar Cadastro</button>
            </form>
        </div>
    </div>
    <script src="/EntregaP1A3/src/js/signUp.js"></script>
</body>
</html>
